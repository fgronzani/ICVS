name: Atualizar Pipeline ICVS

on:
  schedule:
    - cron: "0 6 1 * *"   # Primeiro dia de cada mês às 06h UTC
  workflow_dispatch:        # Trigger manual

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r pipeline/requirements.txt

      - name: Executar pipeline completo
        run: python pipeline/main.py --year $(date +%Y) --output docs/data/

      - name: Commit e push dos dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "data: atualização automática $(date +%Y-%m-%d)"
          git push
